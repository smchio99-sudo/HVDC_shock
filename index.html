<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CORE DEFENSE: HVDC SHOCK (FINAL)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        body { background-color: #020502; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #game-container { position: relative; width: 900px; height: 650px; background: radial-gradient(circle at center, #0a1a0a 0%, #020502 100%); border: 2px solid #00ff41; box-shadow: 0 0 50px rgba(0, 255, 65, 0.15); overflow: hidden; }
        
        #ui-header { position: absolute; top: 0; left: 0; width: 100%; padding: 20px 40px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; color: #00ff41; z-index: 20; background: linear-gradient(to bottom, rgba(0, 255, 65, 0.1), transparent); }
        .stat-group { display: flex; flex-direction: column; }
        .stat-label { font-size: 10px; color: #88ff88; opacity: 0.7; letter-spacing: 2px; }
        .stat-value { font-size: 24px; font-weight: 700; }

        #overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.92); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #fff; text-align: center; }
        h1 { font-size: 55px; margin: 0; color: #00ff41; text-shadow: 0 0 20px rgba(0, 255, 65, 0.6); font-weight: 900; }
        h2 { font-family: 'Rajdhani'; font-size: 16px; margin: 5px 0 20px 0; color: #88ff88; letter-spacing: 5px; text-transform: uppercase; }

        #leaderboard { width: 320px; margin: 20px 0; background: rgba(0, 255, 65, 0.05); padding: 15px; border: 1px solid rgba(0, 255, 65, 0.3); border-radius: 4px; }
        .rank-item { display: flex; justify-content: space-between; font-family: 'Rajdhani'; font-size: 18px; border-bottom: 1px solid rgba(0, 255, 65, 0.1); padding: 6px 0; color: #00ff41; }
        
        #nickname-input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; font-family: 'Orbitron'; text-align: center; margin-bottom: 15px; outline: none; width: 250px; font-size: 16px; }
        button { background: #00ff41; border: none; padding: 12px 40px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; color: #000; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        
        canvas { position: absolute; top: 0; left: 0; }
        .hidden { display: none !important; }
        #shield-msg { position: absolute; bottom: 30px; color: #00ffff; font-size: 14px; text-shadow: 0 0 10px #00ffff; display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-header">
        <div class="stat-group"><span class="stat-label">UPTIME_SEC</span><span id="time-val" class="stat-value">0.00</span></div>
        <div class="stat-group" style="text-align: right;"><span class="stat-label">THREAT_LV</span><span id="lv-val" class="stat-value">01</span></div>
    </div>
    
    <div id="shield-msg">[[ SHIELD_ACTIVE ]]</div>
    <canvas id="game-canvas"></canvas>

    <div id="overlay">
        <div id="start-screen">
            <h1>HVDC SHOCK</h1>
            <h2>High Voltage Direct Current Defense</h2>
            <div id="leaderboard">
                <div class="stat-label" style="margin-bottom:10px;">TOP OPERATORS</div>
                <div id="rank-list">Connecting...</div>
            </div>
            <p style="color: #666; font-size: 13px;">[ENTER] To Initialize System</p>
        </div>

        <div id="gameover-screen" class="hidden">
            <h1 style="color: #ff3333;">CORE MELTDOWN</h1>
            <p id="final-score-text" style="font-size: 30px; color: #fff; margin: 15px 0; font-weight: bold;"></p>
            <input type="text" id="nickname-input" placeholder="ENTER NICKNAME" maxlength="8"><br>
            <button id="submit-btn">UPLOAD & RESTART</button>
            <p style="color: #666; font-size: 12px; margin-top: 15px;">Press [ENTER] to Submit</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDw-si_CJ059o0_KPdiPzdOXbcEL53h7m8",
        authDomain: "hvdc-shock.firebaseapp.com",
        databaseURL: "https://hvdc-shock-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "hvdc-shock",
        storageBucket: "hvdc-shock.firebasestorage.app",
        messagingSenderId: "506100783640",
        appId: "1:506100783640:web:80161499805126dda2c16d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const W = 900, H = 650;
    canvas.width = W; canvas.height = H;

    let player, pins, items, isRunning = false;
    let level = 1, startTime, lastJump, score = 0;
    let lastTime = 0, timeScale = 1.0;
    let isSubmitting = false; // 중복 제출 방지 변수
    const keys = {};

    function loadRanking() {
        const rankList = document.getElementById('rank-list');
        db.ref('rankings').orderByChild('time').limitToLast(5).on('value', (snapshot) => {
            let html = '';
            const scores = [];
            snapshot.forEach(child => { scores.push(child.val()); });
            scores.reverse().forEach((s, i) => {
                html += `<div class="rank-item"><span>${i+1}. ${s.name}</span><span>${s.time.toFixed(2)}s</span></div>`;
            });
            rankList.innerHTML = html || 'No Records';
        });
    }

    class Player {
        constructor() { 
            this.x = W/2; this.y = H/2; this.size = 20; 
            this.speed = 320; 
            this.invincible = false; this.invincEnd = 0; 
        }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y);
            if (this.invincible) {
                ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI*2);
                ctx.strokeStyle = '#00ffff'; ctx.setLineDash([5, 5]); ctx.stroke();
            }
            ctx.fillStyle = '#111'; ctx.strokeStyle = this.invincible ? '#00ffff' : '#00ff41';
            ctx.lineWidth = 3; ctx.fillRect(-10, -10, 20, 20); ctx.strokeRect(-10, -10, 20, 20);
            ctx.fillStyle = this.invincible ? '#00ffff' : '#00ff41'; ctx.fillRect(-4, -4, 8, 8);
            ctx.restore();
        }
        update(dt) {
            let dx = 0, dy = 0;
            if (keys['ArrowUp']) dy -= 1; if (keys['ArrowDown']) dy += 1;
            if (keys['ArrowLeft']) dx -= 1; if (keys['ArrowRight']) dx += 1;
            if (dx !== 0 && dy !== 0) { const n = Math.sqrt(dx*dx+dy*dy); dx/=n; dy/=n; }
            this.x += dx * this.speed * dt; this.y += dy * this.speed * dt;
            this.x = Math.max(15, Math.min(W-15, this.x)); this.y = Math.max(15, Math.min(H-15, this.y));
            if (this.invincible && Date.now() > this.invincEnd) { 
                this.invincible = false; document.getElementById('shield-msg').style.display = 'none'; 
            }
        }
    }

    class Pin {
        constructor(lv) { this.lv = lv; this.init(); }
        init() {
            const s = Math.floor(Math.random()*4);
            if(s==0){this.x=Math.random()*W; this.y=-50;}
            else if(s==1){this.x=Math.random()*W; this.y=H+50;}
            else if(s==2){this.x=-50; this.y=Math.random()*H;}
            else{this.x=W+50; this.y=Math.random()*H;}
            this.angle = Math.atan2(player.y-this.y, player.x-this.x) + (Math.random()-0.5)*0.8;
            this.baseSpeed = 165 + Math.random()*165 + (this.lv*33); 
        }
        update(dt) {
            this.x += Math.cos(this.angle) * this.baseSpeed * timeScale * dt; 
            this.y += Math.sin(this.angle) * this.baseSpeed * timeScale * dt;
            if(this.x<-100||this.x>W+100||this.y<-100||this.y>H+100) this.init();
        }
        draw() { ctx.fillStyle = '#ffcc00'; ctx.fillRect(this.x, this.y, 4, 4); }
    }

    class Item {
        constructor() { this.x = Math.random()*(W-100)+50; this.y = Math.random()*(H-100)+50; this.t = 0; }
        draw() { this.t += 0.1; const s = 10 + Math.sin(this.t)*3; ctx.strokeStyle = '#00ffff'; ctx.strokeRect(this.x-s, this.y-s, s*2, s*2); }
    }

    function initGame() {
        player = new Player(); pins = Array.from({length:12}, () => new Pin(1)); items = [];
        isRunning = true; level = 1; startTime = Date.now(); lastJump = startTime;
        lastTime = performance.now(); timeScale = 1.0; isSubmitting = false;
        document.getElementById('overlay').classList.add('hidden');
        requestAnimationFrame(loop);
    }

    function loop(currentTime) {
        if(!isRunning) return;
        const dt = (currentTime - lastTime) / 1000; lastTime = currentTime;
        const effectiveDt = Math.min(dt, 0.1);
        timeScale += 0.018 * effectiveDt; // 난이도 상승폭 상향

        ctx.fillStyle = '#020502'; ctx.fillRect(0,0,W,H);
        score = (Date.now()-startTime)/1000;
        document.getElementById('time-val').innerText = score.toFixed(2);

        if(Date.now()-lastJump > 5000) {
            level++; document.getElementById('lv-val').innerText = level.toString().padStart(2,'0');
            lastJump = Date.now(); let pAdd = 4 + Math.floor(level/3);
            for(let i=0; i<pAdd; i++) pins.push(new Pin(level));
        }

        player.update(effectiveDt); player.draw();
        if(Math.random() < 0.08 * effectiveDt) items.push(new Item());
        items.forEach((it, i) => {
            it.draw(); if(Math.hypot(player.x-it.x, player.y-it.y)<30) {
                player.invincible = true; player.invincEnd = Date.now()+2500;
                document.getElementById('shield-msg').style.display = 'block'; items.splice(i, 1);
            }
        });
        pins.forEach(p => {
            p.update(effectiveDt); p.draw();
            if(Math.hypot(player.x-p.x, player.y-p.y)<16 && !player.invincible) endGame();
        });
        requestAnimationFrame(loop);
    }

    function endGame() {
        isRunning = false;
        document.getElementById('overlay').classList.remove('hidden');
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('gameover-screen').classList.remove('hidden');
        document.getElementById('final-score-text').innerText = score.toFixed(2) + "s";
        document.getElementById('nickname-input').focus();
    }

    function handleSubmit() {
        if (isSubmitting) return; // 전송 중이면 중단
        const nick = document.getElementById('nickname-input').value.trim() || "GUEST";
        isSubmitting = true; 
        db.ref('rankings').push({ name: nick, time: parseFloat(score.toFixed(2)), date: Date.now() })
          .then(() => location.reload());
    }

    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        if(e.key === 'Enter' && !isRunning) {
            if(!document.getElementById('gameover-screen').classList.contains('hidden')) handleSubmit();
            else initGame();
        }
    });
    window.addEventListener('keyup', e => keys[e.key] = false);
    document.getElementById('submit-btn').onclick = handleSubmit;
    loadRanking();
</script>
</body>
</html>
